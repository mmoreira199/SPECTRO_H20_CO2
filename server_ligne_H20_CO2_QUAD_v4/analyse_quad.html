<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Analyseur Signal Log₁₀</title>
<script src="/static/xlsx.full.min.js"></script>
<script src="/static/chart.umd.js"></script>
<script src="/static/hammer.min.js"></script>
<script src="/static/chartjs-plugin-zoom.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f9fa;--panel:#fff;--card:#f1f5f9;--accent:#6d28d9;--accent2:#7c3aed;
  --text:#1e293b;--sub:#475569;--ok:#16a34a;--warn:#d97706;--border:#cbd5e1;
  --diff:#e11d48;--font:'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--accent);padding:10px 18px;color:#fff;font-size:15px;font-weight:700;flex-shrink:0;}

.body{display:flex;flex:1;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:260px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px;}
.section-title{font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;}
.sidebar label{display:block;font-size:11px;color:var(--sub);margin-bottom:2px;}
.sidebar select,.sidebar input{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--card);color:var(--text);margin-bottom:8px;}
.btn{display:block;width:100%;padding:7px 10px;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px;color:#fff;text-align:center;}
.btn-accent{background:var(--accent);}
.btn-ok{background:var(--ok);}
.btn-diff{background:var(--diff);}
.btn-warn{background:var(--warn);}
.btn-grey{background:#64748b;}
.info{font-size:11px;color:var(--sub);line-height:1.6;margin-top:6px;}
.radio-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.radio-row label{font-size:11px;color:var(--text);margin:0;}

/* ── Contenu principal ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Onglets cycles */
.tabs-row{display:flex;gap:2px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;padding:4px 8px 0;}
.ctab{padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px 4px 0 0;color:var(--sub);background:transparent;border:1px solid transparent;border-bottom:none;white-space:nowrap;}
.ctab.active{background:var(--panel);color:var(--accent);border-color:var(--border);}

.chart-area{flex:1;position:relative;background:var(--panel);padding:10px;min-height:0;overflow:hidden;}
.chart-area canvas{position:absolute;inset:10px;width:calc(100% - 20px)!important;height:calc(100% - 20px)!important;}

.empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:14px;}
</style>
</head>
<body>
<header>⚗ Analyseur de Signal — Log₁₀ par Cycle</header>
<div class="body">

<div class="sidebar">
  <div class="section-title">📂 Fichier Excel</div>
  <div id="fname" style="font-size:11px;color:var(--sub);margin-bottom:6px">Aucun fichier</div>
  <label class="btn btn-accent" style="cursor:pointer">
    Ouvrir .xlsx
    <input type="file" accept=".xlsx,.xls" id="file-input" style="display:none">
  </label>

  <div class="section-title">⚙ Colonnes</div>
  <label>Signal</label><select id="col-signal"></select>
  <label>Masse</label><select id="col-masse"></select>
  <label>Cycle</label><select id="col-cycle"></select>
  <button class="btn btn-ok" onclick="process()">▶ Calculer & Tracer</button>

  <div class="section-title">➖ Soustraction</div>
  <label>Cycle A</label><select id="cyc-a"></select>
  <label>Cycle B</label><select id="cyc-b"></select>
  <div class="radio-row">
    <input type="radio" name="diffmode" value="log10" id="r-log" checked>
    <label for="r-log">log₁₀(A) − log₁₀(B)</label>
  </div>
  <div class="radio-row">
    <input type="radio" name="diffmode" value="raw" id="r-raw">
    <label for="r-raw">A − B (brut)</label>
  </div>
  <button class="btn btn-diff" onclick="plotDiff()">📉 Tracer la différence</button>

  <div class="section-title">💾 Export</div>
  <button class="btn" style="background:#475569" onclick="exportExcel()">Excel enrichi</button>
  <button class="btn btn-warn" onclick="exportCurrentPng()">PNG onglet actif</button>

  <div class="section-title">ℹ Info</div>
  <div class="info" id="info">—</div>
</div>

<div class="main">
  <div class="tabs-row" id="tabs-row"></div>
  <div class="chart-area" id="chart-area">
    <div class="empty" id="empty-msg">Ouvrez un fichier Excel puis cliquez sur « Calculer & Tracer »</div>
    <canvas id="main-chart" style="display:none"></canvas>
  </div>
</div>

</div>
<script>
const COLORS = ["#7c6af7","#f472b6","#34d399","#fbbf24","#60a5fa","#fb923c","#a78bfa","#e879f9","#2dd4bf"];

let df = null; // [{Cycle, Masse, Signal, Signal_log10}, ...]
let cycles = [];
let chart = null;
let activeTab = null;
let figs = {}; // {key: {labels, datasets, title}}

// ── File input ──
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  document.getElementById('fname').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {defval:''});
    if (!raw.length) return;
    df = raw;
    const cols = Object.keys(raw[0]);
    ['col-signal','col-masse','col-cycle'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = cols.map(c=>`<option>${c}</option>`).join('');
    });
    // Auto-détection
    autoDetect(cols);
  };
  reader.readAsArrayBuffer(file);
});

function autoDetect(cols) {
  const low = cols.map(c=>c.toLowerCase());
  const find = (kw) => { const i=low.findIndex(c=>c.includes(kw)); return i>=0?cols[i]:cols[0]; };
  document.getElementById('col-signal').value = find('signal');
  document.getElementById('col-masse').value  = find('masse');
  document.getElementById('col-cycle').value  = find('cycle');
}

// ── Traitement ──
function process() {
  if (!df) return;
  const cs = document.getElementById('col-signal').value;
  const cm = document.getElementById('col-masse').value;
  const cc = document.getElementById('col-cycle').value;

  // log10
  df.forEach(row => {
    const s = parseFloat(row[cs]) || 0;
    row._log10 = Math.log10(Math.abs(s) + 1e-12);
    row._masse  = parseFloat(row[cm]);
    const rawCycle = row[cc];
    row._cycle  = isNaN(parseFloat(rawCycle)) ? rawCycle : parseFloat(rawCycle);
    row._signal = s;
  });

  cycles = [...new Set(df.map(r=>r._cycle))].sort((a,b)=>{
    // Tri numérique si possible, sinon alphabétique
    const na = parseFloat(a), nb = parseFloat(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return String(a).localeCompare(String(b));
  });
  const cycStr = cycles.map(String);
  ['cyc-a','cyc-b'].forEach(id => {
    document.getElementById(id).innerHTML = cycStr.map(c=>`<option>${c}</option>`).join('');
  });
  if (cycStr.length>=2) document.getElementById('cyc-b').value = cycStr[1];

  document.getElementById('info').innerHTML =
    `Cycles : ${cycles.length}<br>Lignes : ${df.length}<br>IDs : ${cycles.slice(0,8).join(', ')}${cycles.length>8?'…':''}`;

  buildTabs();
}

function buildTabs() {
  figs = {};
  const row = document.getElementById('tabs-row');
  row.innerHTML = '';

  // Onglet "Tous"
  const allData = buildAllDatasets();
  figs['all'] = { datasets: allData, title:'Tous les cycles' };
  addTab('all', '📊 Tous');

  // Un onglet par cycle
  cycles.forEach((c,i) => {
    const sub = df.filter(r=>r._cycle===c).sort((a,b)=>a._masse-b._masse);
    figs[c] = {
      datasets:[{ label:`Cycle ${c}`, data: sub.map(r=>({x:r._masse,y:r._log10})),
        borderColor:COLORS[i%COLORS.length], borderWidth:1.5, pointRadius:0, fill:true,
        backgroundColor: hexAlpha(COLORS[i%COLORS.length],0.06), tension:0 }],
      title:`Cycle ${c}`
    };
    addTab(c, `Cycle ${c}`);
  });

  showTab('all');
}

function buildAllDatasets() {
  return cycles.map((c,i) => {
    const sub = df.filter(r=>r._cycle===c).sort((a,b)=>a._masse-b._masse);
    return { label:`Cycle ${c}`, data: sub.map(r=>({x:r._masse,y:r._log10})),
      borderColor:COLORS[i%COLORS.length], borderWidth:1.3, pointRadius:0, fill:false, tension:0 };
  });
}

function addTab(key, label) {
  const t = document.createElement('div');
  t.className='ctab'; t.textContent=label; t.dataset.key=key;
  t.onclick = () => showTab(key);
  document.getElementById('tabs-row').appendChild(t);
}

function showTab(key) {
  activeTab = key;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.toggle('active',t.dataset.key==key));
  const fig = figs[key];
  if (!fig) return;
  document.getElementById('empty-msg').style.display='none';
  const cvs = document.getElementById('main-chart');
  cvs.style.display='block';

  if (chart) { chart.destroy(); chart=null; }
  const ctx = cvs.getContext('2d');
  chart = new Chart(ctx, {
    type:'line',
    data:{ datasets: fig.datasets },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{
        legend:{ display:fig.datasets.length<=12, labels:{font:{size:10},boxWidth:14,color:'#475569'} },
        zoom:{ zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'xy'}, pan:{enabled:true,mode:'xy'} },
        title:{ display:true, text:fig.title, color:'#1e293b', font:{size:13,weight:'bold'} }
      },
      scales:{
        x:{ type:'linear', ticks:{color:'#475569',stepSize:2, font:{family:'Consolas',size:10}},
            grid:{color:'rgba(0,0,0,.06)'}, title:{display:true,text:'Masse (m/z)',color:'#475569',font:{size:11}} },
        y:{ ticks:{color:'#475569',font:{size:10}}, grid:{color:'rgba(0,0,0,.06)'},
            title:{display:true,text:'Signal log₁₀(S+ε)',color:'#475569',font:{size:11}} }
      }
    }
  });
}

// ── Soustraction ──
function plotDiff() {
  if (!df || cycles.length<2) return;
  const valA = document.getElementById('cyc-a').value;
  const valB = document.getElementById('cyc-b').value;
  const mode = document.querySelector('input[name=diffmode]:checked').value;
  const cc = document.getElementById('col-cycle').value;

  const cycleA = cycles.find(c => String(c) === valA);
  const cycleB = cycles.find(c => String(c) === valB);
  const subA = df.filter(r=>r._cycle===cycleA).sort((a,b)=>a._masse-b._masse);
  const subB = df.filter(r=>r._cycle===cycleB).sort((a,b)=>a._masse-b._masse);

  const massesA = new Set(subA.map(r=>r._masse));
  const massesB = new Set(subB.map(r=>r._masse));
  const common  = [...massesA].filter(m=>massesB.has(m)).sort((a,b)=>a-b);
  if (!common.length) { alert('Aucune masse commune'); return; }

  const mapA = {}; subA.forEach(r=>{ mapA[r._masse]=r; });
  const mapB = {}; subB.forEach(r=>{ mapB[r._masse]=r; });

  const diffData = common.map(m => {
    const ya = mode==='log10' ? mapA[m]._log10 : mapA[m]._signal;
    const yb = mode==='log10' ? mapB[m]._log10 : mapB[m]._signal;
    return {x:m, y:ya-yb};
  });

  const key = `diff_${valA}_${valB}_${mode}`;
  const ylabel = mode==='log10' ? `log₁₀(A) − log₁₀(B)` : `Signal A − B (brut)`;

  figs[key] = {
    title: `Différence (${mode}) : Cycle ${valA} − Cycle ${valB}`,
    datasets:[
      { label:`${valA}−${valB}`, data: diffData, borderColor:'#e11d48', borderWidth:1.5, pointRadius:0, fill:false, tension:0 },
      { label:'0', data:[{x:common[0],y:0},{x:common[common.length-1],y:0}], borderColor:'#cbd5e1', borderWidth:1, borderDash:[4,3], pointRadius:0, fill:false }
    ],
    yLabel: ylabel,
  };

  // Supprimer l'onglet si existe déjà
  document.querySelectorAll('.ctab').forEach(t=>{ if(t.dataset.key===key) t.remove(); });
  addTab(key, `➖ ${valA}−${valB}`);
  showTab(key);
}

// ── Export ──
function exportCurrentPng() {
  if (!chart) return;
  const a = document.createElement('a');
  a.download = `analyse_${activeTab||'graph'}.png`;
  a.href = chart.toBase64Image();
  a.click();
}

function exportExcel() {
  if (!df) return;
  const ws = XLSX.utils.json_to_sheet(df.map(r=>({...r, Signal_log10: r._log10})));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Données');
  XLSX.writeFile(wb, 'analyse_log10.xlsx');
}

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
</script>
</body>
</html>
